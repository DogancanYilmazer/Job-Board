services:
  db:
    image: postgres:16-alpine
    container_name: job_board_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_board_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_board_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: job_board_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: job_board_mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: job_board_app
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@db:5432/job_board_db
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: job_board_mongo
      API_PREFIX: /api/v1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./static/uploads:/app/static/uploads

volumes:
  postgres_data:
  mongo_data:
