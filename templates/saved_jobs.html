{% extends "base.html" %}

{% block title %}Saved Jobs - JobBoard{% endblock %}

{% block content %}
<!-- Page Header -->
<div class="bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <h1 class="text-3xl font-bold text-gray-900">Saved Jobs</h1>
        <p class="text-gray-500 mt-2">Your bookmarked job listings</p>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div id="saved-jobs-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
            <div class="flex items-start gap-4">
                <div class="skeleton w-14 h-14 rounded-xl flex-shrink-0"></div>
                <div class="flex-1">
                    <div class="skeleton h-5 w-1/3 rounded mb-2"></div>
                    <div class="skeleton h-4 w-1/4 rounded mb-3"></div>
                    <div class="skeleton h-4 w-full rounded"></div>
                </div>
            </div>
        </div>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
            <div class="flex items-start gap-4">
                <div class="skeleton w-14 h-14 rounded-xl flex-shrink-0"></div>
                <div class="flex-1">
                    <div class="skeleton h-5 w-1/3 rounded mb-2"></div>
                    <div class="skeleton h-4 w-1/4 rounded mb-3"></div>
                    <div class="skeleton h-4 w-full rounded"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function loadSavedJobs() {
        const { user, token } = getAuthFromStorage();
        if (!user || !token) {
            window.location.href = '/login';
            return;
        }

        const container = document.getElementById('saved-jobs-container');
        try {
            const data = await api('/saved-jobs');
            const jobs = data.data || [];

            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-white rounded-2xl border border-gray-100">
                        <div class="w-20 h-20 mx-auto bg-gray-100 rounded-full flex items-center justify-center mb-4">
                            <i class="far fa-bookmark text-3xl text-gray-400"></i>
                        </div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-2">No saved jobs</h3>
                        <p class="text-gray-500 mb-6">You have not saved any job listings yet.</p>
                        <a href="/jobs" class="btn-primary inline-block px-6 py-3 text-white font-medium rounded-xl">Browse Job Listings</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = jobs.map(item => {
                const job = item.job || {};
                const location = [job.city, job.country].filter(Boolean).join(', ');
                return `
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover animate-fade-in">
                        <div class="flex items-start gap-4">
                            <div class="w-14 h-14 bg-gradient-to-br from-primary-100 to-cyan-100 rounded-xl flex items-center justify-center text-primary-600 font-bold text-xl flex-shrink-0">
                                ${(job.title || 'J').charAt(0)}
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-start justify-between">
                                    <div>
                                        <a href="/jobs/${job.id}" class="font-semibold text-gray-900 text-lg hover:text-primary-600 transition">${escapeHtml(job.title || 'Untitled')}</a>
                                        <p class="text-sm text-gray-500 mt-1">${location || 'Not specified'}</p>
                                    </div>
                                    <button onclick="removeSavedJob('${job.id}', this)" class="p-2 text-gray-400 hover:text-red-500 transition" title="Remove">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <div class="flex flex-wrap gap-2 mt-3">
                                    ${job.status ? `<span class="px-2.5 py-1 bg-gray-100 text-gray-600 text-xs rounded-lg font-medium">${job.status}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch (err) {
            container.innerHTML = `
                <div class="col-span-full text-center py-16 bg-white rounded-2xl border border-gray-100">
                    <div class="w-20 h-20 mx-auto bg-red-100 rounded-full flex items-center justify-center mb-4">
                        <i class="fas fa-exclamation-triangle text-3xl text-red-500"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 mb-2">An error occurred</h3>
                    <p class="text-gray-500">${escapeHtml(err.message)}</p>
                </div>
            `;
        }
    }

    async function removeSavedJob(jobId, btn) {
        try {
            await api(`/saved-jobs/${jobId}`, { method: 'DELETE' });
            const card = btn.closest('.bg-white');
            card.style.opacity = '0';
            setTimeout(() => {
                card.remove();
                const remaining = document.querySelectorAll('#saved-jobs-container .bg-white');
                if (remaining.length === 0) loadSavedJobs();
            }, 300);
            showToast('Removed', 'Job removed from saved jobs.');
        } catch (err) {
            showToast('Error', err.message, 'error');
        }
    }

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        }[char]));
    }

    loadSavedJobs();
</script>
{% endblock %}
