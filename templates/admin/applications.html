{% extends "admin/admin_base.html" %}
{% block title %}Application Management{% endblock %}
{% block page_title %}Applications{% endblock %}
{% block content %}
<div class="space-y-4 animate-fade-in">
    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <div class="flex flex-col md:flex-row md:items-end gap-3">
            <div class="flex-1">
                <label class="block text-xs font-medium text-gray-500 mb-1">Search</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fas fa-search"></i></span>
                    <input type="text" id="search-q" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm" placeholder="Job title, applicant name..." onkeydown="if(event.key==='Enter') loadApplications()">
                </div>
            </div>
            <div class="w-full md:w-48">
                <label class="block text-xs font-medium text-gray-500 mb-1">Status</label>
                <select id="filter-status" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm" onchange="loadApplications()">
                    <option value="">All</option>
                    <option value="APPLIED">Applied</option>
                    <option value="REVIEWED">Reviewed</option>
                    <option value="INTERVIEW">Interview</option>
                    <option value="OFFER">Offer</option>
                    <option value="ACCEPTED">Accepted</option>
                    <option value="REJECTED">Rejected</option>
                    <option value="WITHDRAWN">Withdrawn</option>
                </select>
            </div>
            <button onclick="loadApplications()" class="px-4 py-2 bg-admin-600 text-white text-sm font-medium rounded-lg hover:bg-admin-700 transition-colors">
                <i class="fas fa-filter mr-1"></i> Filter
            </button>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
                    <tr>
                        <th class="px-6 py-3 font-medium">Applicant</th>
                        <th class="px-6 py-3 font-medium">Job</th>
                        <th class="px-6 py-3 font-medium">Match</th>
                        <th class="px-6 py-3 font-medium">Status</th>
                        <th class="px-6 py-3 font-medium">Date</th>
                        <th class="px-6 py-3 font-medium text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="apps-table" class="divide-y divide-gray-100 text-sm">
                    <tr><td colspan="6" class="px-6 py-8 text-center text-gray-400">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
            <p class="text-sm text-gray-500" id="pagination-info">—</p>
            <div class="flex items-center space-x-2">
                <button onclick="changePage(-1)" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 disabled:opacity-50" id="btn-prev">Previous</button>
                <button onclick="changePage(1)" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 disabled:opacity-50" id="btn-next">Next</button>
            </div>
        </div>
    </div>
</div>

<!-- Inline Status Update Modal -->
<div id="status-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full mx-4 p-6 animate-fade-in">
        <h3 class="text-lg font-bold text-gray-900 mb-4">Update Status</h3>
        <select id="app-status-select" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm mb-4">
            <option value="APPLIED">Applied</option>
            <option value="REVIEWED">Reviewed</option>
            <option value="INTERVIEW">Interview</option>
            <option value="OFFER">Offer</option>
            <option value="ACCEPTED">Accepted</option>
            <option value="REJECTED">Rejected</option>
            <option value="WITHDRAWN">Withdrawn</option>
        </select>
        <div class="flex justify-end space-x-2">
            <button onclick="closeStatusModal()" class="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg transition-colors">Cancel</button>
            <button onclick="submitStatusUpdate()" class="px-4 py-2 bg-admin-600 text-white font-medium rounded-lg hover:bg-admin-700 transition-colors">Save</button>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    let currentPage = 1;
    let totalPages = 1;
    let editingAppId = null;

    async function loadApplications() {
        const q = document.getElementById('search-q').value.trim();
        const status = document.getElementById('filter-status').value;
        const params = new URLSearchParams({ page: currentPage, limit: 20 });
        if (q) params.set('q', q);
        if (status) params.set('status', status);

        try {
            const res = await adminApi(`/admin/applications?${params.toString()}`);
            const apps = res.data || [];
            const meta = res.meta || {};
            totalPages = Math.ceil((meta.total || 0) / meta.limit) || 1;

            const tbody = document.getElementById('apps-table');
            if (apps.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-gray-400">No applications found.</td></tr>';
            } else {
                tbody.innerHTML = apps.map(a => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-3">
                            <div class="flex items-center gap-2">
                                <p class="font-medium text-gray-900">${escapeHtml(a.applicant_name || '-')}</p>
                            </div>
                        </td>
                        <td class="px-6 py-3 text-gray-600">${escapeHtml(a.job_title || '-')}</td>
                        <td class="px-6 py-3">${renderMatchScoreBadge(a.match_score)}</td>
                        <td class="px-6 py-3">
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${statusColor(a.status)}">${a.status}</span>
                        </td>
                        <td class="px-6 py-3 text-gray-600">${formatDate(a.submitted_at)}</td>
                        <td class="px-6 py-3 text-right">
                            <button onclick="openStatusModal('${a.id}', '${a.status}')" class="text-admin-600 hover:text-admin-800 font-medium">Status</button>
                        </td>
                    </tr>
                `).join('');
            }
            document.getElementById('pagination-info').textContent = `Page ${meta.page || 1} / ${totalPages} — Total ${meta.total || 0} records`;
            document.getElementById('btn-prev').disabled = currentPage <= 1;
            document.getElementById('btn-next').disabled = currentPage >= totalPages;
        } catch (err) {
            showToast('Error', err.message, 'error');
        }
    }

    function statusColor(status) {
        const map = {
            'APPLIED': 'bg-blue-100 text-blue-800',
            'REVIEWED': 'bg-indigo-100 text-indigo-800',
            'INTERVIEW': 'bg-purple-100 text-purple-800',
            'OFFER': 'bg-orange-100 text-orange-800',
            'ACCEPTED': 'bg-green-100 text-green-800',
            'REJECTED': 'bg-red-100 text-red-800',
            'WITHDRAWN': 'bg-gray-100 text-gray-800',
        };
        return map[status] || 'bg-gray-100 text-gray-800';
    }

    function renderMatchScoreBadge(matchScore) {
        if (matchScore === null || matchScore === undefined) return '';
        const score = Math.max(0, Math.min(100, Number(matchScore) || 0));
        let color = 'bg-red-100 text-red-700';
        if (score >= 80) color = 'bg-green-100 text-green-700';
        else if (score >= 50) color = 'bg-yellow-100 text-yellow-700';
        return `
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-bold ${color}" title="Skills match score">
                <i class="fas fa-bullseye"></i> ${score}%
            </span>
        `;
    }

    function changePage(delta) {
        currentPage += delta;
        if (currentPage < 1) currentPage = 1;
        loadApplications();
    }

    function openStatusModal(appId, currentStatus) {
        editingAppId = appId;
        document.getElementById('app-status-select').value = currentStatus;
        document.getElementById('status-modal').classList.remove('hidden');
    }

    function closeStatusModal() {
        document.getElementById('status-modal').classList.add('hidden');
        editingAppId = null;
    }

    async function submitStatusUpdate() {
        if (!editingAppId) return;
        const status = document.getElementById('app-status-select').value;
        try {
            await adminApi(`/admin/applications/${editingAppId}/status`, {
                method: 'PATCH',
                body: JSON.stringify({ status, note: 'Updated from admin panel' })
            });
            showToast('Success', 'Status updated.');
            closeStatusModal();
            loadApplications();
        } catch (err) {
            showToast('Error', err.message, 'error');
        }
    }

    loadApplications();
</script>
{% endblock %}
