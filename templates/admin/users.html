{% extends "admin/admin_base.html" %}
{% block title %}User Management{% endblock %}
{% block page_title %}Users{% endblock %}
{% block content %}
<div class="space-y-4 animate-fade-in">
    <!-- Filters -->
    <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
        <div class="flex flex-col md:flex-row md:items-end gap-3">
            <div class="flex-1">
                <label class="block text-xs font-medium text-gray-500 mb-1">Search</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fas fa-search"></i></span>
                    <input type="text" id="search-q" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 focus:border-admin-500 outline-none text-sm" placeholder="Email, name, phone..." onkeydown="if(event.key==='Enter') loadUsers()">
                </div>
            </div>
            <div class="w-full md:w-40">
                <label class="block text-xs font-medium text-gray-500 mb-1">Role</label>
                <select id="filter-role" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm" onchange="loadUsers()">
                    <option value="">All</option>
                    <option value="ADMIN">Admin</option>
                    <option value="EMPLOYER">Employer</option>
                    <option value="APPLICANT">Applicant</option>
                </select>
            </div>
            <div class="w-full md:w-40">
                <label class="block text-xs font-medium text-gray-500 mb-1">Status</label>
                <select id="filter-status" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm" onchange="loadUsers()">
                    <option value="">All</option>
                    <option value="ACTIVE">Active</option>
                    <option value="ONBOARDING">Onboarding</option>
                    <option value="INACTIVE">Inactive</option>
                </select>
            </div>
            <div class="w-full md:w-40">
                <label class="block text-xs font-medium text-gray-500 mb-1">Block</label>
                <select id="filter-blocked" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm" onchange="loadUsers()">
                    <option value="">All</option>
                    <option value="true">Blocked</option>
                    <option value="false">Active</option>
                </select>
            </div>
            <button onclick="loadUsers()" class="px-4 py-2 bg-admin-600 text-white text-sm font-medium rounded-lg hover:bg-admin-700 transition-colors">
                <i class="fas fa-filter mr-1"></i> Filter
            </button>
        </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50 text-gray-500 text-xs uppercase">
                    <tr>
                        <th class="px-6 py-3 font-medium">User</th>
                        <th class="px-6 py-3 font-medium">Roles</th>
                        <th class="px-6 py-3 font-medium">Status</th>
                        <th class="px-6 py-3 font-medium">Registration Date</th>
                        <th class="px-6 py-3 font-medium text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="users-table" class="divide-y divide-gray-100 text-sm">
                    <tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        <!-- Pagination -->
        <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
            <p class="text-sm text-gray-500" id="pagination-info">—</p>
            <div class="flex items-center space-x-2" id="pagination-controls">
                <button onclick="changePage(-1)" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 disabled:opacity-50" id="btn-prev">Previous</button>
                <button onclick="changePage(1)" class="px-3 py-1.5 border border-gray-300 rounded-lg text-sm hover:bg-gray-50 disabled:opacity-50" id="btn-next">Next</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    let currentPage = 1;
    let totalPages = 1;

    async function loadUsers() {
        const q = document.getElementById('search-q').value.trim();
        const role = document.getElementById('filter-role').value;
        const status = document.getElementById('filter-status').value;
        const blocked = document.getElementById('filter-blocked').value;

        const params = new URLSearchParams({ page: currentPage, limit: 20 });
        if (q) params.set('q', q);
        if (role) params.set('role', role);
        if (status) params.set('status', status);
        if (blocked) params.set('is_blocked', blocked);

        try {
            const res = await adminApi(`/admin/users?${params.toString()}`);
            const users = res.data || [];
            const meta = res.meta || {};
            totalPages = Math.ceil((meta.total || 0) / meta.limit) || 1;

            const tbody = document.getElementById('users-table');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-400">No users found.</td></tr>';
            } else {
                tbody.innerHTML = users.map(u => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-3">
                            <div class="flex items-center space-x-3">
                                <img src="${u.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.full_name || u.email)}&background=random`}" class="w-8 h-8 rounded-full" alt="">
                                <div>
                                    <p class="font-medium text-gray-900">${escapeHtml(u.full_name || 'Unnamed')}</p>
                                    <p class="text-xs text-gray-500">${escapeHtml(u.email)}</p>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-3">
                            ${(u.roles || []).map(r => `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${r === 'ADMIN' ? 'bg-red-100 text-red-800' : r === 'EMPLOYER' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}">${r}</span>`).join(' ')}
                        </td>
                        <td class="px-6 py-3">
                            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${u.is_blocked ? 'bg-red-100 text-red-800' : u.status === 'ACTIVE' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">${u.is_blocked ? 'BLOCKED' : u.status}</span>
                        </td>
                        <td class="px-6 py-3 text-gray-600">${formatDate(u.created_at)}</td>
                        <td class="px-6 py-3 text-right">
                            <a href="/admin/users/${u.id}" class="text-admin-600 hover:text-admin-800 font-medium mr-3">Detail</a>
                        </td>
                    </tr>
                `).join('');
            }

            document.getElementById('pagination-info').textContent = `Page ${meta.page || 1} / ${totalPages} — Total ${meta.total || 0} records`;
            document.getElementById('btn-prev').disabled = currentPage <= 1;
            document.getElementById('btn-next').disabled = currentPage >= totalPages;
        } catch (err) {
            showToast('Error', err.message, 'error');
        }
    }

    function changePage(delta) {
        currentPage += delta;
        if (currentPage < 1) currentPage = 1;
        loadUsers();
    }

    loadUsers();
</script>
{% endblock %}
