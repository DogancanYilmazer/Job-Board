{% extends "admin/admin_base.html" %}
{% block title %}Site Settings{% endblock %}
{% block page_title %}Settings{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto animate-fade-in">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-lg font-bold text-gray-900 mb-6">General Settings</h2>
        <form id="settings-form" onsubmit="handleSave(event)">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Site Name</label>
                    <input type="text" id="st-site_name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Logo URL</label>
                    <input type="text" id="st-logo_url" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contact Email</label>
                    <input type="email" id="st-contact_email" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contact Phone</label>
                    <input type="text" id="st-contact_phone" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Default Country</label>
                    <input type="text" id="st-default_country" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Default Phone Code</label>
                    <input type="text" id="st-default_phone_code" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Terms of Service URL</label>
                    <input type="text" id="st-terms_url" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Privacy Policy URL</label>
                    <input type="text" id="st-privacy_url" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 outline-none text-sm">
                </div>
            </div>
            <div class="flex items-center space-x-2 mb-6">
                <input type="checkbox" id="st-email_notifications_enabled" class="w-4 h-4 text-admin-600 border-gray-300 rounded focus:ring-admin-500">
                <label for="st-email_notifications_enabled" class="text-sm text-gray-700">Email notifications enabled</label>
            </div>
            <div class="flex items-center justify-end">
                <button type="submit" id="save-btn" class="px-6 py-2.5 bg-admin-600 text-white font-medium rounded-lg hover:bg-admin-700 focus:ring-4 focus:ring-admin-200 transition-all flex items-center">
                    <span>Save</span>
                    <i id="save-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
    async function loadSettings() {
        try {
            const res = await adminApi('/admin/settings');
            const s = res.data || {};
            document.getElementById('st-site_name').value = s.site_name || '';
            document.getElementById('st-logo_url').value = s.logo_url || '';
            document.getElementById('st-contact_email').value = s.contact_email || '';
            document.getElementById('st-contact_phone').value = s.contact_phone || '';
            document.getElementById('st-default_country').value = s.default_country || '';
            document.getElementById('st-default_phone_code').value = s.default_phone_code || '';
            document.getElementById('st-terms_url').value = s.terms_url || '';
            document.getElementById('st-privacy_url').value = s.privacy_url || '';
            document.getElementById('st-email_notifications_enabled').checked = !!s.email_notifications_enabled;
        } catch (err) {
            showToast('Error', err.message, 'error');
        }
    }

    async function handleSave(e) {
        e.preventDefault();
        const btn = document.getElementById('save-btn');
        const spinner = document.getElementById('save-spinner');
        btn.disabled = true;
        spinner.classList.remove('hidden');

        const payload = {
            site_name: document.getElementById('st-site_name').value || null,
            logo_url: document.getElementById('st-logo_url').value || null,
            contact_email: document.getElementById('st-contact_email').value || null,
            contact_phone: document.getElementById('st-contact_phone').value || null,
            default_country: document.getElementById('st-default_country').value || null,
            default_phone_code: document.getElementById('st-default_phone_code').value || null,
            terms_url: document.getElementById('st-terms_url').value || null,
            privacy_url: document.getElementById('st-privacy_url').value || null,
            email_notifications_enabled: document.getElementById('st-email_notifications_enabled').checked,
        };

        try {
            await adminApi('/admin/settings', {
                method: 'PUT',
                body: JSON.stringify(payload)
            });
            showToast('Success', 'Settings saved.');
        } catch (err) {
            showToast('Error', err.message, 'error');
        } finally {
            btn.disabled = false;
            spinner.classList.add('hidden');
        }
    }

    loadSettings();
</script>
{% endblock %}
