<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — JobBoard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        admin: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 animate-fade-in">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-admin-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-alt text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Admin Panel</h1>
            <p class="text-gray-500 mt-1">Log in with your admin account</p>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" id="email" required class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 focus:border-admin-500 outline-none transition-all" placeholder="admin@example.com">
                </div>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-admin-500 focus:border-admin-500 outline-none transition-all" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" id="login-btn" class="w-full bg-admin-600 text-white font-semibold py-2.5 rounded-lg hover:bg-admin-700 focus:ring-4 focus:ring-admin-200 transition-all flex items-center justify-center">
                <span>Login</span>
                <i id="login-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
            </button>
        </form>

        <div id="error-msg" class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm hidden">
            <i class="fas fa-exclamation-circle mr-1"></i> <span id="error-text"></span>
        </div>

        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-admin-600 transition-colors">
                <i class="fas fa-arrow-left mr-1"></i> Back to Site
            </a>
        </div>
    </div>

    <script>
        const API_URL = '/api/v1';

        function getAdminAuth() {
            let user = JSON.parse(localStorage.getItem('user') || 'null');
            let token = localStorage.getItem('token');
            if (!user || !token) {
                user = JSON.parse(sessionStorage.getItem('user') || 'null');
                token = sessionStorage.getItem('token');
            }
            return { user, token };
        }

        // If already admin logged in, redirect to dashboard
        (function() {
            const { user, token } = getAdminAuth();
            if (user && token && (user.roles || []).includes('ADMIN')) {
                window.location.href = '/admin';
            }
        })();

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('login-spinner');
            const errorMsg = document.getElementById('error-msg');
            const errorText = document.getElementById('error-text');

            btn.disabled = true;
            spinner.classList.remove('hidden');
            errorMsg.classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, remember_me: true })
                });
                const data = await res.json();
                if (!res.ok || data.errors?.length) {
                    throw new Error(data.errors?.[0]?.message || 'Login failed');
                }

                const result = data.data;
                if (result.requires_2fa) {
                    throw new Error('2FA is not supported. Please log in without 2FA.');
                }

                const user = result.user || result;
                if (!user.roles?.includes('ADMIN')) {
                    throw new Error('You do not have admin privileges.');
                }

                localStorage.setItem('token', result.access_token);
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = '/admin';
            } catch (err) {
                errorText.textContent = err.message;
                errorMsg.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
