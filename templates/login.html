{% extends "base.html" %}

{% block title %}Log In - JobBoard{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-primary-50 to-cyan-50">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center space-x-2">
                <div class="w-12 h-12 bg-gradient-to-br from-primary-600 to-cyan-500 rounded-xl flex items-center justify-center">
                    <i class="fas fa-briefcase text-white text-xl"></i>
                </div>
                <span class="text-2xl font-bold text-gray-900">Job<span class="text-primary-600">Board</span></span>
            </a>
            <h2 class="mt-6 text-3xl font-bold text-gray-900">Welcome Back</h2>
            <p class="mt-2 text-gray-500">Log in to continue to your account</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="email" id="email" required placeholder="example@email.com" 
                            class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="password" id="password" required placeholder="••••••••" 
                            class="w-full pl-12 pr-12 py-3.5 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all">
                        <button type="button" onclick="togglePassword('password')" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center cursor-pointer">
                        <input type="checkbox" id="remember-me" class="w-4 h-4 text-primary-600 rounded border-gray-300 focus:ring-primary-500">
                        <span class="ml-2 text-sm text-gray-600">Remember me</span>
                    </label>
                    <a href="/forgot-password" class="text-sm text-primary-600 hover:text-primary-700 font-medium">Forgot password?</a>
                </div>
                <button type="submit" id="login-btn" class="w-full btn-primary py-3.5 text-white font-semibold rounded-xl">
                    Log In
                </button>
            </form>

            <form id="twofa-form" class="hidden" onsubmit="handleTwoFactorLogin(event)">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Authenticator Code</label>
                    <div class="relative">
                        <i class="fas fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="twofa-code" required maxlength="6" inputmode="numeric" pattern="[0-9]{6}" placeholder="123456"
                            class="w-full pl-12 pr-4 py-3.5 rounded-xl border border-gray-200 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all tracking-widest">
                    </div>
                </div>
                <button type="submit" id="twofa-btn" class="w-full btn-primary py-3.5 text-white font-semibold rounded-xl">
                    Verify Code
                </button>
                <button type="button" onclick="resetLoginForm()" class="w-full mt-3 px-4 py-3 text-gray-600 font-medium rounded-xl hover:bg-gray-50 transition">
                    Back to Login
                </button>
            </form>

            <!-- Social logins removed -->
        </div>

        <p class="mt-8 text-center text-gray-500">
            Don't have an account? 
            <a href="/register" class="text-primary-600 font-semibold hover:text-primary-700">Sign up now</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let pendingTwoFactorToken = null;

    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
    }

    function storeSession(loginData, rememberMe) {
        const user = loginData.user || loginData;
        const storage = rememberMe ? localStorage : sessionStorage;
        const otherStorage = rememberMe ? sessionStorage : localStorage;
        storage.setItem('user', JSON.stringify(user));
        if (loginData.access_token) {
            storage.setItem('token', loginData.access_token);
        }
        storage.removeItem('pending_2fa_token');
        storage.removeItem('pending_2fa_remember_me');
        // Clean up other storage to avoid ambiguity
        otherStorage.removeItem('user');
        otherStorage.removeItem('token');
        otherStorage.removeItem('pending_2fa_token');
        otherStorage.removeItem('pending_2fa_remember_me');
        return user;
    }

    function showTwoFactorStep(tempToken, rememberMe) {
        pendingTwoFactorToken = tempToken;
        localStorage.setItem('pending_2fa_token', tempToken);
        localStorage.setItem('pending_2fa_remember_me', rememberMe ? '1' : '0');
        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('twofa-form').classList.remove('hidden');
        document.getElementById('twofa-code').focus();
    }

    function resetLoginForm() {
        pendingTwoFactorToken = null;
        localStorage.removeItem('pending_2fa_token');
        localStorage.removeItem('pending_2fa_remember_me');
        document.getElementById('twofa-code').value = '';
        document.getElementById('twofa-form').classList.add('hidden');
        document.getElementById('login-form').classList.remove('hidden');
        const btn = document.getElementById('login-btn');
        btn.disabled = false;
        btn.innerHTML = 'Log In';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Logging in...';

        try {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember-me').checked;
            const data = await api('/auth/login', {
                method: 'POST',
                body: JSON.stringify({ email, password, remember_me: rememberMe })
            });

            const loginData = data.data;
            if (loginData.requires_2fa) {
                showTwoFactorStep(loginData.temp_token, rememberMe);
                btn.disabled = false;
                btn.innerHTML = 'Log In';
                return;
            }
            
            const user = storeSession(loginData, rememberMe);
            showToast('Login Successful', `Welcome, ${user.full_name || user.email}!`);
            setTimeout(() => window.location.href = '/', 1000);
        } catch (err) {
            showToast('Login Failed', err.message, 'error');
            btn.disabled = false;
            btn.innerHTML = 'Log In';
        }
    }

    async function handleTwoFactorLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('twofa-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Verifying...';

        try {
            const tempToken = pendingTwoFactorToken || localStorage.getItem('pending_2fa_token');
            const rememberMe = (localStorage.getItem('pending_2fa_remember_me') === '1');
            const code = document.getElementById('twofa-code').value;
            const data = await api('/auth/2fa/validate', {
                method: 'POST',
                body: JSON.stringify({ temp_token: tempToken, code, remember_me: rememberMe })
            });

            const user = storeSession(data.data, rememberMe);
            showToast('Login Successful', `Welcome, ${user.full_name || user.email}!`);
            setTimeout(() => window.location.href = '/', 1000);
        } catch (err) {
            showToast('Verification Failed', err.message, 'error');
            btn.disabled = false;
            btn.innerHTML = 'Verify Code';
        }
    }
</script>
{% endblock %}
